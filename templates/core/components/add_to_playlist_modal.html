<!-- Add to Playlist Modal -->
<div class="modal fade"
     id="add-to-playlist-modal"
     tabindex="-1"
     aria-labelledby="add-to-playlist-label"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-dark" id="add-to-playlist-label">Add to Playlist</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <form id="add-to-playlist-form">
        <div class="modal-body">
          <input type="hidden" id="music_id" name="music_id" />
          <!-- Existing Playlists -->
          <h6 class="text-dark">Your Playlists</h6>
          <div id="playlists-container" class="mb-3">
            <!-- Playlists will be loaded here via AJAX -->
          </div>
          <!-- Separator -->
          <div class="separator my-3">
            <span class="text-dark">OR</span>
          </div>
          <!-- Create New Playlist -->
          <div id="new-playlist-container">
            <h6 class="text-dark">Create New Playlist</h6>
            <div class="mb-3">
              <label for="new-playlist-name" class="form-label text-dark">Playlist Name</label>
              <input type="text"
                     class="form-control text-dark"
                     id="new-playlist-name"
                     name="new_playlist_name"
                     placeholder="My Awesome Playlist" />
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input"
                     type="checkbox"
                     id="new-playlist-public"
                     name="new_playlist_public"
                     checked />
              <label class="form-check-label text-dark" for="new-playlist-public">Make playlist public</label>
            </div>
          </div>
        </div>
        <div class="modal-footer" id="add-to-playlist-modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Add to Playlist</button>
        </div>
      </form>
    </div>
  </div>
</div>
<style>
  /* Styles for Add to Playlist modal */
  .modal-title, 
  .text-dark, 
  .form-label.text-dark,
  .form-check-label.text-dark {
    color: black;
  }
  
  .form-control.text-dark {
    color: black;
  }
  
  .playlists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
  }

  .playlist-item {
    position: relative;
  }

  .playlist-radio {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .playlist-label {
    display: flex;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all 0.2s;
    color: black;
  }

  .playlist-label:hover {
    background-color: rgba(140, 82, 255, 0.1);
  }

  .playlist-radio:checked + .playlist-label {
    background-color: rgba(140, 82, 255, 0.2);
    border-color: var(--primary-color);
  }

  .playlist-cover {
    width: 50px;
    height: 50px;
    flex-shrink: 0;
    margin-right: 10px;
    border-radius: 4px;
    overflow: hidden;
  }

  .playlist-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .playlist-info {
    overflow: hidden;
  }

  .playlist-info h5 {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 0.9rem;
    color: black;
  }

  .playlist-info small {
    color: black !important;
  }

  .separator {
    display: flex;
    align-items: center;
    text-align: center;
    color: black;
  }

  .separator::before,
  .separator::after {
    content: "";
    flex: 1;
    border-bottom: 1px solid var(--border-color);
  }

  .separator:not(:empty)::before {
    margin-right: 0.5em;
  }

  .separator:not(:empty)::after {
    margin-left: 0.5em;
  }

  .text-dark {
    color: black !important;
  }
</style>
